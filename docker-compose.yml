version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pg_payment_gateway
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_payment_gateway
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: